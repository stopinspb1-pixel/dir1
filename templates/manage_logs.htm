{% extends "base.htm" %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<h3 style="margin-top: 20px; color: #dc3545;">⚙ Панель управления файлом val.txt</h3>

<div style="text-align: left; background-color: #f8f9fa; padding: 15px; border: 1px solid #dee2e6; border-radius: 4px; margin-top: 20px;">
    <p><strong>Путь к файлу:</strong> <br><small style="font-family: monospace;">{{ file_path }}</small></p>
    <p><strong>Текущий размер:</strong> {{ file_size }} байт</p>
</div>

<!-- ФОРМА ОТПРАВКИ КОМАНДЫ НА ОЧИСТКУ (Метод POST на адрес /test3/clear) -->
<form action="/test3/clear" method="post" style="margin-top: 25px;">
    <button type="submit" class="btn-one" 
            style="background-color: #dc3545; color: white; border: none; width: 100%; padding: 12px;"
            onclick="return confirm('Вы уверены, что хотите полностью очистить файл val.txt?');">
        🗑 Полностью очистить файл логов
    </button>
</form>

<div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
    <a href="/3" class="btn-zero" style="text-decoration: none; padding: 10px; color: black; font-size: 14px;">К кнопкам 1-3</a>
    <a href="/test/status" class="btn-zero" style="text-decoration: none; padding: 10px; color: black; font-size: 14px;">Посмотреть логи</a>
</div>
{% endblock %}
